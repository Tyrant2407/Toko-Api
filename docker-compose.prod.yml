services:
  toko_db:
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-toko_db}
    # Do NOT expose port 3306 externally in production
    ports: !reset []

  toko_api:
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=toko_db;Database=${MYSQL_DATABASE:-toko_db};User=root;Password=${MYSQL_ROOT_PASSWORD};CharSet=utf8mb4;"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: TokoApi
      Jwt__Audience: TokoFrontend
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    # Do NOT expose port externally — sit behind nginx reverse proxy
    ports: !reset []

  toko_frontend:
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    ports:
      - "3000:3000"
