services:
  toko_db_mysql:
    image: mysql:8.0
    container_name: toko_mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: toko_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # <--- Tambahkan blok sakti ini di bawah volumes database
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword" ]
      timeout: 5s
      retries: 5
      interval: 5s

  toko_web_api:
    image: tokoapi-image
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toko_api_container
    restart: always
    ports:
      - "5174:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=toko_db_mysql;Database=toko_db;User=root;Password=rootpassword;
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      toko_db_mysql:
        condition: service_healthy
volumes:
  mysql_data:
